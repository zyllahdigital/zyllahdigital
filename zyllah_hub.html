<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyllah Digital — Hub de Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #B8976A; --gold-light: #D4B896;
  --ink: #1A1714; --ink-soft: #3D3830;
  --cream: #FAF7F2; --cream-mid: #F0EBE1;
  --sidebar-w: 260px;
}
html, body { height: 100%; }
body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--ink); color: var(--cream); overflow: hidden; }

/* SENHA */
#senha-tela { position: fixed; inset: 0; z-index: 99999; background: var(--ink); display: flex; align-items: center; justify-content: center; }
.senha-box { width: 100%; max-width: 380px; padding: 56px 48px; display: flex; flex-direction: column; gap: 22px; }
.senha-logo { font-family: 'Cormorant Garamond', serif; font-size: 12px; color: rgba(184,151,106,0.4); letter-spacing: 0.4em; text-transform: uppercase; }
.senha-titulo { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: white; line-height: 1.1; }
.senha-titulo em { font-style: italic; color: var(--gold-light); }
.senha-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(184,151,106,0.3); padding: 13px 0; font-family: 'Jost', sans-serif; font-size: 17px; color: white; outline: none; letter-spacing: 0.12em; transition: border-color 0.2s; }
.senha-input:focus { border-bottom-color: var(--gold); }
.senha-input::placeholder { color: rgba(255,255,255,0.22); font-size: 13px; letter-spacing: 0.25em; }
.senha-btn { background: var(--gold); color: var(--ink); border: none; padding: 13px 28px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; align-self: flex-start; }
.senha-btn:hover { background: var(--gold-light); }
.senha-erro { font-size: 12px; color: rgba(210,100,100,0.8); min-height: 16px; }

/* LAYOUT */
#app { height: 100vh; display: none; flex-direction: column; }
.topbar { height: 48px; flex-shrink: 0; background: var(--ink); border-bottom: 1px solid rgba(184,151,106,0.12); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
.topbar-logo { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--gold); letter-spacing: 0.25em; }
.topbar-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.workspace { flex: 1; display: flex; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #141210; border-right: 1px solid rgba(184,151,106,0.1); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-section { padding: 20px 20px 8px; font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(184,151,106,0.35); border-top: 1px solid rgba(184,151,106,0.07); }
.sidebar-section:first-child { border-top: none; }
.empresa-btn { display: flex; align-items: center; gap: 12px; padding: 11px 20px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; transition: background 0.15s; position: relative; }
.empresa-btn:hover { background: rgba(184,151,106,0.05); }
.empresa-btn.ativa { background: rgba(184,151,106,0.08); }
.empresa-btn.ativa::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); }
.empresa-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-piloto   { background: var(--gold); }
.dot-ativo    { background: #8FC4B4; }
.dot-producao { background: #B0A0D0; }
.dot-prospect { background: transparent; border: 1px solid rgba(255,255,255,0.25); }
.empresa-info { flex: 1; min-width: 0; }
.empresa-nome { font-size: 13px; color: rgba(255,255,255,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.empresa-btn.ativa .empresa-nome { color: white; }
.empresa-status { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.22); margin-top: 2px; }
.empresa-btn.ativa .empresa-status { color: rgba(184,151,106,0.55); }
.sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid rgba(184,151,106,0.08); font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.05em; line-height: 1.6; }

/* PAINEL */
.painel { flex: 1; overflow-y: auto; background: var(--ink); }
.painel-header { padding: 36px 48px 24px; border-bottom: 1px solid rgba(184,151,106,0.1); position: sticky; top: 0; z-index: 10; background: var(--ink); }
.painel-setor { font-size: 10px; letter-spacing: 0.45em; text-transform: uppercase; color: rgba(184,151,106,0.45); margin-bottom: 8px; }
.painel-nome { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 36px; color: white; line-height: 1.0; margin-bottom: 6px; }
.painel-desc { font-size: 13px; color: rgba(255,255,255,0.32); line-height: 1.6; max-width: 540px; }
.painel-meta { display: flex; gap: 32px; padding: 14px 48px; border-bottom: 1px solid rgba(184,151,106,0.08); background: rgba(255,255,255,0.01); }
.meta-item { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(184,151,106,0.4); }
.meta-val { font-size: 13px; color: rgba(255,255,255,0.5); }
.painel-alerta { margin: 18px 48px 0; background: rgba(184,151,106,0.05); border-left: 2px solid rgba(184,151,106,0.35); padding: 10px 16px; font-size: 12px; color: rgba(184,151,106,0.65); line-height: 1.5; }

/* CATEGORIAS */
.categorias { padding: 28px 48px 60px; }
.categoria { margin-bottom: 28px; }
.cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.cat-icone { font-size: 13px; color: rgba(184,151,106,0.4); }
.cat-nome { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(184,151,106,0.45); white-space: nowrap; }
.cat-linha { flex: 1; height: 1px; background: rgba(184,151,106,0.1); }
.docs-lista { display: flex; flex-direction: column; gap: 2px; }
.doc-item { display: flex; align-items: center; gap: 14px; padding: 10px 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(184,151,106,0.07); text-decoration: none; color: inherit; transition: all 0.15s; }
.doc-item:hover { background: rgba(184,151,106,0.07); border-color: rgba(184,151,106,0.22); }
.doc-item.inativo { opacity: 0.32; pointer-events: none; }
.doc-nome { flex: 1; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.3; }
.doc-item:hover .doc-nome { color: white; }
.doc-tag { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; padding: 3px 9px; flex-shrink: 0; }
.tag-ok       { background: rgba(122,155,138,0.12); color: #8FC4B4; }
.tag-rascunho { background: rgba(184,151,106,0.1);  color: var(--gold); }
.tag-pendente { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.25); }
.doc-arrow { font-size: 11px; color: rgba(184,151,106,0.3); flex-shrink: 0; transition: color 0.15s; }
.doc-item:hover .doc-arrow { color: var(--gold); }

/* VAZIO */
.painel-vazio { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 14px; }
.painel-vazio-icone { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 72px; color: rgba(184,151,106,0.1); line-height: 1; }
.painel-vazio-texto { font-size: 12px; color: rgba(255,255,255,0.18); letter-spacing: 0.2em; text-transform: uppercase; }
</style>
</head>
<body>

<div id="senha-tela">
  <div class="senha-box">
    <div class="senha-logo">Zyllah Digital</div>
    <div class="senha-titulo">Hub de<br><em>Clientes</em></div>
    <input class="senha-input" id="senha-input" type="password" placeholder="senha de acesso" autocomplete="off">
    <div class="senha-erro" id="senha-erro"></div>
    <button class="senha-btn" onclick="verificarSenha()">Entrar →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Zyllah Digital</div>
    <div class="topbar-label">Uso interno</div>
  </div>
  <div class="workspace">
    <div class="sidebar">
      <div class="sidebar-section">Clientes</div>
      <button class="empresa-btn" onclick="selecionar(this,'encantarys')">
        <div class="empresa-dot dot-producao"></div>
        <div class="empresa-info"><div class="empresa-nome">Encantarys</div><div class="empresa-status">Em produção</div></div>
      </button>
      <button class="empresa-btn" onclick="selecionar(this,'thayara')">
        <div class="empresa-dot dot-prospect"></div>
        <div class="empresa-info"><div class="empresa-nome">Thayara</div><div class="empresa-status">Prospect</div></div>
      </button>
      <div class="sidebar-section">Interno</div>
      <button class="empresa-btn" onclick="selecionar(this,'zyllah')">
        <div class="empresa-dot dot-ativo"></div>
        <div class="empresa-info"><div class="empresa-nome">Zyllah Digital</div><div class="empresa-status">Templates e operação</div></div>
      </button>
      <div class="sidebar-footer">2 clientes · 1 prospect<br>14 documentos produzidos</div>
    </div>
    <div class="painel" id="painel">
      <div class="painel-vazio">
        <div class="painel-vazio-icone">Z</div>
        <div class="painel-vazio-texto">Selecione uma empresa</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var SENHA = 'Zyl@Hub26', KEY = 'zyl_hub2_v1';
  function mostrar() {
    document.getElementById('senha-tela').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }
  if (sessionStorage.getItem(KEY) === '1') { mostrar(); return; }
  window.verificarSenha = function() {
    var inp = document.getElementById('senha-input'), err = document.getElementById('senha-erro');
    if (inp.value === SENHA) {
      sessionStorage.setItem(KEY, '1');
      var t = document.getElementById('senha-tela');
      t.style.transition = 'opacity 0.3s'; t.style.opacity = '0';
      setTimeout(function() { t.style.display = 'none'; mostrar(); }, 300);
    } else { err.textContent = 'Senha incorreta.'; inp.value = ''; inp.focus(); setTimeout(function(){ err.textContent=''; }, 2000); }
  };
  document.addEventListener('keydown', function(e){ if(e.key==='Enter') verificarSenha(); });
})();

var DB = {
  encantarys: {
    setor: 'Festas e eventos',
    nome: 'Encantarys',
    desc: 'Decoração e produção de festas. Identidade própria — midnight, violeta e dourado, fonte Cinzel.',
    meta: [{l:'Status',v:'Em produção'},{l:'Início',v:'2025'},{l:'Identidade',v:'Própria'}],
    alerta: '⚠ Anúncio com referência a concorrente (@fgpegueemonte) — corrigir antes de impulsionar',
    cats: [
      { nome:'Estratégia / Diagnóstico', ic:'◈', docs:[
        {n:'Diagnóstico de Presença Digital',    href:'diagnostico_encantarys.html',    t:'Pronto',     tc:'tag-ok'},
        {n:'Briefing e Estratégia de Marca',     href:'festaemont_briefing.html',       t:'Pronto',     tc:'tag-ok'},
        {n:'Diagnóstico Festa e Monte',          href:'diagnostico_festaemonte.html',   t:'Pronto',     tc:'tag-ok'},
      ]},
      { nome:'Identidade / Brandbook', ic:'◉', docs:[
        {n:'Brandbook Encantarys',               href:'encantarys_brandbook.html',      t:'Pronto',     tc:'tag-ok'},
        {n:'Brandbook Festa e Monte',            href:'',                               t:'Pendente',   tc:'tag-pendente', x:true},
      ]},
      { nome:'Produção / Conteúdo', ic:'▦', docs:[
        {n:'Roteiro de Fotos — guia operacional',href:'festaemonte_roteiro_fotos.html', t:'Entregue',   tc:'tag-ok'},
        {n:'Templates Instagram',                href:'',                               t:'Pendente',   tc:'tag-pendente', x:true},
        {n:'Templates de conteúdo',              href:'',                               t:'Pendente',   tc:'tag-pendente', x:true},
      ]},
      { nome:'Operação / Contratos', ic:'▣', docs:[
        {n:'Formulário de Briefing',             href:'festaemont_formulario.html',     t:'Preenchido', tc:'tag-ok'},
        {n:'Contrato Piloto',                    href:'zyllah_contratos.html',          t:'Pronto',     tc:'tag-ok'},
      ]},
    ]
  },
  thayara: {
    setor: 'Saúde · indicação via pastor Lucas',
    nome: 'Thayara',
    desc: 'Profissional de saúde. Prospect quente — abordar pastor Lucas para confirmar interesse.',
    meta: [{l:'Origem',v:'Indicação'},{l:'Via',v:'Pastor Lucas'},{l:'Ação',v:'Abordar'}],
    alerta: '⚠ Não foi abordada ainda — confirmar interesse antes de produzir qualquer material',
    cats: [
      { nome:'Estratégia / Diagnóstico', ic:'◈', docs:[
        {n:'zyllah_thayara.html — mapear conteúdo',href:'zyllah_thayara.html',          t:'Ver',        tc:'tag-rascunho'},
        {n:'Diagnóstico inicial',                href:'',                               t:'Não iniciado',tc:'tag-pendente', x:true},
      ]},
      { nome:'Identidade / Brandbook', ic:'◉', docs:[
        {n:'Brandbook',                          href:'',                               t:'Não iniciado',tc:'tag-pendente', x:true},
      ]},
      { nome:'Produção / Conteúdo', ic:'▦', docs:[
        {n:'Conteúdo Instagram',                 href:'',                               t:'Não iniciado',tc:'tag-pendente', x:true},
      ]},
      { nome:'Operação / Contratos', ic:'▣', docs:[
        {n:'Formulário de Briefing',             href:'',                               t:'Não iniciado',tc:'tag-pendente', x:true},
        {n:'Contrato — modelo pronto',           href:'zyllah_contratos.html',          t:'Modelo',     tc:'tag-rascunho'},
      ]},
    ]
  },
  zyllah: {
    setor: 'Interno · Zyllah Digital',
    nome: 'Zyllah Digital',
    desc: 'Templates reutilizáveis, documentação interna e materiais de processo da agência.',
    meta: [{l:'Tipo',v:'Uso interno'},{l:'Acesso',v:'Guilherme'},{l:'Docs',v:'14 produzidos'}],
    alerta: null,
    cats: [
      { nome:'Estratégia / Diagnóstico', ic:'◈', docs:[
        {n:'Estratégia de Vendas e Planos',      href:'zyllah_vendas.html',             t:'Pronto',     tc:'tag-ok'},
        {n:'Script de Reunião',                  href:'zyllah_script_reuniao.html',     t:'Pronto',     tc:'tag-ok'},
        {n:'Guia de Objeções',                   href:'zyllah_objecoes.html',           t:'Pronto',     tc:'tag-ok'},
      ]},
      { nome:'Identidade / Brandbook', ic:'◉', docs:[
        {n:'Brandbook Zyllah Digital',           href:'zyllah_brandbook.html',          t:'Pronto',     tc:'tag-ok'},
      ]},
      { nome:'Produção / Conteúdo', ic:'▦', docs:[
        {n:'Apresentação de Vendas 16:9',        href:'zyllah_apresentacao_16x9.html',  t:'Pronto',     tc:'tag-ok'},
        {n:'Calendário Editorial',               href:'zyllah_calendario.html',         t:'Pronto',     tc:'tag-ok'},
        {n:'Template Frame Instagram',           href:'Padronização_zyllah_frame_template.html', t:'Pronto', tc:'tag-ok'},
      ]},
      { nome:'Operação / Contratos', ic:'▣', docs:[
        {n:'Contratos (Piloto · Mensal · Anual)',href:'zyllah_contratos.html',          t:'Pronto',     tc:'tag-ok'},
        {n:'Template Formulário — novo cliente', href:'TEMPLATE_formulario_cliente.html',t:'Pronto',   tc:'tag-ok'},
        {n:'Briefing de Identidade — público',   href:'zyllah_briefing.html',           t:'Pronto',     tc:'tag-ok'},
      ]},
    ]
  }
};

function selecionar(btn, id) {
  document.querySelectorAll('.empresa-btn').forEach(function(b){ b.classList.remove('ativa'); });
  btn.classList.add('ativa');
  var c = DB[id], h = '';

  h += '<div class="painel-header">';
  h += '<div class="painel-setor">'+c.setor+'</div>';
  h += '<div class="painel-nome">'+c.nome+'</div>';
  h += '<div class="painel-desc">'+c.desc+'</div>';
  h += '</div>';

  h += '<div class="painel-meta">';
  c.meta.forEach(function(m){ h += '<div class="meta-item"><div class="meta-label">'+m.l+'</div><div class="meta-val">'+m.v+'</div></div>'; });
  h += '</div>';

  if (c.alerta) h += '<div class="painel-alerta">'+c.alerta+'</div>';

  h += '<div class="categorias">';
  c.cats.forEach(function(cat){
    h += '<div class="categoria">';
    h += '<div class="cat-header"><span class="cat-icone">'+cat.ic+'</span><span class="cat-nome">'+cat.nome+'</span><span class="cat-linha"></span></div>';
    h += '<div class="docs-lista">';
    cat.docs.forEach(function(doc){
      var cls = 'doc-item'+(doc.x?' inativo':'');
      var tag = '<span class="doc-tag '+doc.tc+'">'+doc.t+'</span>';
      var arr = doc.x ? '' : '<span class="doc-arrow">→</span>';
      if (doc.href && !doc.x) {
        h += '<a class="'+cls+'" href="'+doc.href+'" target="_blank"><span class="doc-nome">'+doc.n+'</span>'+tag+arr+'</a>';
      } else {
        h += '<div class="'+cls+'"><span class="doc-nome">'+doc.n+'</span>'+tag+'</div>';
      }
    });
    h += '</div></div>';
  });
  h += '</div>';

  document.getElementById('painel').innerHTML = h;
}
</script>
</body>
</html>
